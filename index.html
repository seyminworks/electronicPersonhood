<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval' data: blob:;">
    <title>Electronic Personhood - Abstract Data Visualization</title>
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@300;400&display=swap" rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --pink: #ff007f;
            --green: #32cd32;
            --cyan: #00ffff;
            --yellow: #ffff00;
        }

        body {
            font-family: 'Roboto Mono', monospace;
            background: #ffffff;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        .label-text {
            font-size: 0.6rem;
            letter-spacing: 0.07em;
            text-transform: uppercase;
            color: #1a1a1a;
            white-space: nowrap;
            user-select: none;
            pointer-events: none;
        }

        /* ── Header / Footer ───────────────────────────── */
        header,
        footer {
            position: fixed;
            left: 0;
            width: 100%;
            padding: 2rem;
            z-index: 20;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            pointer-events: none;
        }

        header a,
        footer a {
            pointer-events: all;
            transition: color 0.2s ease, border-color 0.2s ease;
        }

        header a:hover,
        footer a:hover {
            color: var(--pink) !important;
            border-color: var(--pink) !important;
        }

        header {
            top: 0;
            align-items: flex-start;
        }

        footer {
            bottom: 0;
            align-items: flex-end;
        }

        h1 {
            font-size: 1.15rem;
            font-weight: 300;
            letter-spacing: -0.04em;
        }

        /* ── Shapes ─────────────────────────────────────── */
        .shape {
            position: absolute;
            cursor: default;
            will-change: transform;
        }

        /* Filled shape (agent assigned) */
        .shape.filled {
            cursor: pointer;
            animation: pulse 2.4s ease-in-out infinite;
        }

        .shape.filled.paused {
            animation-play-state: paused;
            cursor: pointer;
        }

        @keyframes pulse {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.20);
            }
        }

        /* ── Audio unlock screen ────────────────── */
        #audio-unlock {
            position: fixed;
            inset: 0;
            z-index: 200;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            background: transparent;
        }

        #audio-unlock-hint {
            font-family: 'Roboto Mono', monospace;
            font-size: 0.55rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: #1a1a1a;
            border: 1px solid #1a1a1a;
            padding: 0.5rem 1.2rem;
            opacity: 0.5;
            animation: blink-hint 2s ease-in-out infinite;
        }

        @keyframes blink-hint {

            0%,
            100% {
                opacity: 0.3;
            }

            50% {
                opacity: 0.7;
            }
        }

        /* All shapes stop when hovered-state is active */
        body.freeze .shape {
            transition: none;
        }

        /* ── Modal ──────────────────────────────── */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.3);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }

        .modal-overlay.open {
            display: flex;
        }

        .modal-window {
            background: #ffffff;
            border: 1px solid #d0d0d0;
            font-family: 'Roboto Mono', monospace;
            z-index: 101;
            width: 340px;
            /* transform makes this a containing block for fixed descendants */
            transform: translate(0, 0);
            will-change: transform;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.9rem 1.2rem;
            border-bottom: 1px solid #e8e8e8;
        }

        .modal-meta {
            display: flex;
            flex-direction: column;
            gap: 0.15rem;
        }

        .modal-name {
            font-size: 0.65rem;
            letter-spacing: 0.06em;
            color: #1a1a1a;
        }

        .modal-date {
            font-size: 0.5rem;
            letter-spacing: 0.06em;
            color: #999;
        }

        .modal-close-btn {
            background: none;
            border: 1px solid #d0d0d0;
            color: #1a1a1a;
            font-family: 'Roboto Mono', monospace;
            font-size: 0.5rem;
            letter-spacing: 0.1em;
            padding: 0.3rem 0.8rem;
            cursor: pointer;
            text-transform: uppercase;
        }

        .modal-close-btn:hover {
            background: #f5f5f5;
        }

        .widget-container {
            width: 340px;
            min-height: 460px;
            display: block;
        }
    </style>
    <script src="https://unpkg.com/@elevenlabs/convai-widget-embed" async type="text/javascript"></script>
</head>

<body>

                    style="color:inherit;text-decoration:none;">Facing Faces, KF XR gallery</a></p>
            <p class="label-text" style="opacity:0.5">03.31.2026~07.31.2026</p>
        </div>

    <!-- Canvas -->
    <main id="viz-container" style="position:relative;width:100vw;height:100vh;overflow:hidden;"></main>

    <!-- Footer -->
    <footer>
        <div>
            <p class="label-text"><a href="https://linktr.ee/seymin" target="_blank"
                    style="color:inherit;text-decoration:none;">ARTIST SEY MIN</a></p>
            <p class="label-text" style="opacity:0.5">© 2026 ELECTRONIC PERSONHOOD</p>
            <p class="label-text" style="opacity:0.5">Phase II of <a href="https://seyminworks.github.io/me_myVself/"
                    target="_blank" style="color:inherit;text-decoration:none;">Generated Selves</a></p>
        </div>
        <div style="text-align:right">
            <p class="label-text"><a href="https://forms.gle/DzTJyGE9Lf2X36nL6" target="_blank"
                    style="color:inherit;text-decoration:none;border-bottom:1px solid #1a1a1a;">LEAVE YOUR GENERATED
                    SELF</a></p>
        </div>
    </footer>

    <!-- Audio unlock overlay -->
    <div id="audio-unlock">
        <span id="audio-unlock-hint">click anywhere to begin</span>

    <!-- Modal -->
    <div class="modal-overlay" id="modal-overlay">

            </div>
            <div class="widget-container">
                <elevenlabs-convai agent-id="agent_3101kjq6p68aexcaw96a1zkrxsbf"></elevenlabs-convai>
            </div>
        </div>
    </div>

    <script src="JS/main.js"></script>
</body>

</html>
